<!DOCTYPE html>
<html lang='en'>
    <head>
        <meta charset='UTF-8'>
        <link rel='stylesheet' href='../static/css/style.css'>
        <link rel='icon' type='image/png' href='../static/png/ico.png'>
        <title>GDL Comparator</title>
    </head>
    <body>
        <p class='title'>Global Demonlist Comparator</p>
        <div class='inputClass'>
            <input id='user1'>
            <input id='user2'>
            <button onclick='compare()'>GO</button>
            <div id='out'></div>
        </div>
        <script>
            async function compare() {
                let r = await fetch('/compare', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({usernames: [user1.value, user2.value]})})
                let d = await r.json()
                out.innerText = ''
                out.innerText += `[${d.users[0].country}] ${d.users[0].username}\nPlacement: #${d.users[0].placement}\nPoints: ${d.users[0].points}\nHardest level: ${d.users[0].hardestLevelName} by ${d.users[0].hardestLevelCreator} (#${d.users[0].hardestLevelPlacement})`
                out.innerText += '\n\n'
                out.innerText += `[${d.users[1].country}] ${d.users[1].username}\nPlacement: #${d.users[1].placement}\nPoints: ${d.users[1].points}\nHardest level: ${d.users[1].hardestLevelName} by ${d.users[1].hardestLevelCreator} (#${d.users[1].hardestLevelPlacement})`
                out.innerText += '\n\n'
                out.innerText += d.comparison.results
            }
            let button = document.querySelector('button')
            button.addEventListener('click', function(e) {
                let circle = document.createElement('div')
                let rect = button.getBoundingClientRect()
                circle.classList.add('circle')
                let x = e.clientX - rect.left
                let y = e.clientY - rect.top
                circle.style.left = `${x}px`
                circle.style.top = `${y}px`
                button.appendChild(circle)
                setTimeout(function() {
                    circle.remove()
                }, 500)
            })
        </script>
    </body>
</html>
